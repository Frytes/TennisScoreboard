version: '3.8'

services:
  app:
    image: tomcat:10.1-jdk17
    container_name: tennis-app
    depends_on:
      - db
    ports:
      - "80:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/tennis-db
      - DB_USER=postgres
      - DB_PASSWORD=root
    volumes:
      - ./target/tennis-scoreboard.war:/usr/local/tomcat/webapps/ROOT.war
    restart: always

  db:
    image: postgres:15-alpine
    container_name: tennis-db
    environment:
      - POSTGRES_DB=tennis-db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: